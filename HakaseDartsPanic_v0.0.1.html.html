<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>はかせのダーツパニック</title>
    <style>
        /* Modern Clean Mobile-First Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d0614;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        /* 9:16 Aspect Ratio Responsive Container */
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background-color: #110a24;
            display: block;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="450" height="800"></canvas>
    </div>

    <script>
        // ==========================================
        // 1. STORAGE MANAGER
        // ==========================================
        class StorageManager {
            static getBestScore() {
                try {
                    return parseInt(localStorage.getItem('hakase_best_score')) || 0;
                } catch (e) {
                    return 0; // Fallback for sandboxed frames or disabled storage
                }
            }

            static saveBestScore(score) {
                try {
                    const currentBest = this.getBestScore();
                    if (score > currentBest) {
                        localStorage.setItem('hakase_best_score', score.toString());
                    }
                } catch (e) {
                    // Fallback silently if storage is restricted
                }
            }
        }

        // ==========================================
        // 2. INPUT MANAGER
        // ==========================================
        class InputManager {
            constructor(canvas) {
                this.canvas = canvas;
                this.mouseX = 225; // Default center
                this.mouseY = 0;
                this.isPressed = false;
                this.justPressed = false;

                this.setupListeners();
            }

            setupListeners() {
                const getCoords = (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                    // Convert actual viewport pixels to 450x800 coordinate scale
                    const scaleX = this.canvas.width / rect.width;
                    const scaleY = this.canvas.height / rect.height;

                    return {
                        x: (clientX - rect.left) * scaleX,
                        y: (clientY - rect.top) * scaleY
                    };
                };

                const onDown = (e) => {
                    const coords = getCoords(e);
                    this.mouseX = coords.x;
                    this.mouseY = coords.y;
                    this.isPressed = true;
                    this.justPressed = true;
                };

                const onMove = (e) => {
                    const coords = getCoords(e);
                    this.mouseX = coords.x;
                    this.mouseY = coords.y;
                };

                const onUp = () => {
                    this.isPressed = false;
                };

                // Desktop Listeners
                this.canvas.addEventListener('mousedown', onDown);
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onUp);

                // Touch Mobile Listeners
                this.canvas.addEventListener('touchstart', (e) => {
                    onDown(e);
                    if (e.cancelable) e.preventDefault();
                }, { passive: false });

                window.addEventListener('touchmove', (e) => {
                    onMove(e);
                    if (e.cancelable) e.preventDefault();
                }, { passive: false });

                window.addEventListener('touchend', onUp);
            }

            consumePress() {
                const state = this.justPressed;
                this.justPressed = false;
                return state;
            }
        }

        // ==========================================
        // 3. TIMER
        // ==========================================
        class Timer {
            constructor(durationSeconds) {
                this.duration = durationSeconds * 1000;
                this.timeLeft = this.duration;
                this.isRunning = false;
            }

            start() {
                this.isRunning = true;
            }

            stop() {
                this.isRunning = false;
            }

            reset() {
                this.timeLeft = this.duration;
            }

            update(dt) {
                if (!this.isRunning) return;
                this.timeLeft -= dt;
                if (this.timeLeft <= 0) {
                    this.timeLeft = 0;
                    this.isRunning = false;
                }
            }

            getFormattedTime() {
                const totalSeconds = Math.ceil(this.timeLeft / 1000);
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }

            isZero() {
                return this.timeLeft <= 0;
            }
        }

        // ==========================================
        // 4. SCENE MANAGER
        // ==========================================
        class SceneManager {
            constructor() {
                this.currentScene = 'TITLE'; // SCENES: TITLE, PLAY, RESULT
                this.fadeAlpha = 0;
                this.fadeTarget = 0;
                this.fadeSpeed = 0.08;
                this.onSceneChanged = null;
                this.isFading = false;
            }

            changeScene(sceneName, onSceneChanged = null) {
                if (this.isFading) return;
                this.isFading = true;
                this.fadeTarget = 1.0;
                this.onSceneChanged = () => {
                    this.currentScene = sceneName;
                    if (onSceneChanged) onSceneChanged();
                };
            }

            update(dt) {
                if (this.isFading) {
                    this.fadeAlpha += (this.fadeTarget - this.fadeAlpha) * this.fadeSpeed;
                    if (Math.abs(this.fadeAlpha - this.fadeTarget) < 0.03) {
                        this.fadeAlpha = this.fadeTarget;
                        if (this.fadeTarget === 1.0) {
                            if (this.onSceneChanged) {
                                this.onSceneChanged();
                                this.onSceneChanged = null;
                            }
                            this.fadeTarget = 0.0; // Fade back in
                        } else {
                            this.isFading = false;
                        }
                    }
                }
            }

            drawTransition(ctx, w, h) {
                if (this.fadeAlpha <= 0) return;
                ctx.save();
                ctx.fillStyle = `rgba(13, 6, 20, ${this.fadeAlpha})`;
                ctx.fillRect(0, 0, w, h);
                ctx.restore();
            }
        }

        // ==========================================
        // 5. PLAYER
        // ==========================================
        class Player {
            constructor(canvasWidth, canvasHeight) {
                this.canvasWidth = canvasWidth;
                this.canvasHeight = canvasHeight;
                this.width = 64;
                this.height = 70;
                this.x = canvasWidth / 2;
                this.y = canvasHeight - 110;
                this.targetX = this.x;
                this.easing = 0.16; // Smooth movement interpolation factor
            }

            update(targetX) {
                const limitLeft = this.width / 2 + 10;
                const limitRight = this.canvasWidth - this.width / 2 - 10;
                this.targetX = Math.max(limitLeft, Math.min(limitRight, targetX));
                this.x += (this.targetX - this.x) * this.easing;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Body (Yellow rounded profile)
                ctx.fillStyle = '#FFEB3B';
                ctx.beginPath();
                ctx.arc(0, 5, 20, 0, Math.PI * 2);
                ctx.fill();

                // Head Base
                ctx.beginPath();
                ctx.arc(10, -20, 14, 0, Math.PI * 2);
                ctx.fillRect(0, -34, 14, 20);
                ctx.fill();

                // Snout
                ctx.beginPath();
                ctx.arc(16, -18, 8, 0, Math.PI * 2);
                ctx.fill();

                // Spine/Spikes (Orange)
                ctx.fillStyle = '#FF9800';
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.moveTo(-16 + i * 8, -12);
                    ctx.lineTo(-20 + i * 8, -20);
                    ctx.lineTo(-12 + i * 8, -16);
                    ctx.closePath();
                    ctx.fill();
                }

                // Eyes
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(12, -24, 4.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(13.5, -24, 2, 0, Math.PI * 2);
                ctx.fill();

                // Cheek Accent (Pink)
                ctx.fillStyle = '#FF4081';
                ctx.beginPath();
                ctx.arc(6, -14, 3, 0, Math.PI * 2);
                ctx.fill();

                // Front Hand
                ctx.fillStyle = '#FDD835';
                ctx.fillRect(8, -2, 8, 4);

                // Feet (Orange)
                ctx.fillStyle = '#FF9800';
                ctx.fillRect(-10, 20, 8, 12);
                ctx.fillRect(2, 20, 8, 12);

                // Tail (Yellow)
                ctx.fillStyle = '#FFEB3B';
                ctx.beginPath();
                ctx.moveTo(-16, 10);
                ctx.lineTo(-32, 5);
                ctx.lineTo(-12, 0);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }
        }

        // ==========================================
        // 6. UI UTILITIES
        // ==========================================
        class UI {
            static drawButton(ctx, x, y, w, h, text, isPressed, hover) {
                ctx.save();
                ctx.translate(x, y);

                // Button click feedback scaling
                if (hover) {
                    ctx.scale(isPressed ? 0.95 : 1.03, isPressed ? 0.95 : 1.03);
                }

                // Drop Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.beginPath();
                ctx.roundRect(-w/2 + 2, -h/2 + 4, w, h, 10);
                ctx.fill();

                // Button Face
                ctx.fillStyle = hover ? '#FF7043' : '#FF5722';
                ctx.beginPath();
                ctx.roundRect(-w/2, -h/2, w, h, 10);
                ctx.fill();

                // Highlight Outline
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 3;
                ctx.stroke();

                // Text
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 20px "Courier New", Courier, monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, 0, 0);

                ctx.restore();
            }

            static isInside(mx, my, bx, by, bw, bh) {
                return (
                    mx >= bx - bw/2 &&
                    mx <= bx + bw/2 &&
                    my >= by - bh/2 &&
                    my <= by + bh/2
                );
            }
        }

        // ==========================================
        // 7. GAME ENGINE COORDINATOR
        // ==========================================
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');

                this.storage = StorageManager;
                this.input = new InputManager(this.canvas);
                this.scenes = new SceneManager();
                this.timer = new Timer(120); // Sprint 1 standard: 02:00
                this.player = new Player(this.canvas.width, this.canvas.height);

                this.score = 0;
                this.combo = 0;
                this.bestScore = this.storage.getBestScore();

                // Animated background bubbles
                this.bgBubbles = [];
                for (let i = 0; i < 20; i++) {
                    this.bgBubbles.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        radius: Math.random() * 5 + 2,
                        speed: Math.random() * 0.5 + 0.2
                    });
                }

                this.lastTime = 0;
            }

            init() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
                requestAnimationFrame((t) => this.loop(t));
            }

            resize() {
                const winW = window.innerWidth;
                const winH = window.innerHeight;
                const targetRatio = 450 / 800;
                const screenRatio = winW / winH;

                let w, h;
                if (screenRatio < targetRatio) {
                    w = winW;
                    h = winW / targetRatio;
                } else {
                    h = winH;
                    w = winH * targetRatio;
                }
                this.canvas.style.width = `${w}px`;
                this.canvas.style.height = `${h}px`;
            }

            loop(timestamp) {
                if (!this.lastTime) this.lastTime = timestamp;
                let dt = timestamp - this.lastTime;
                if (dt > 100) dt = 16.66; // Prevent step errors on unfocused tabs
                this.lastTime = timestamp;

                this.update(dt);
                this.draw();

                requestAnimationFrame((t) => this.loop(t));
            }

            update(dt) {
                this.scenes.update(dt);
                this.updateBackground(dt);

                const mx = this.input.mouseX;
                const my = this.input.mouseY;
                const pressed = this.input.consumePress();

                const scene = this.scenes.currentScene;

                if (scene === 'TITLE') {
                    const overStart = UI.isInside(mx, my, 225, 520, 180, 50);
                    if (overStart && pressed && !this.scenes.isFading) {
                        this.scenes.changeScene('PLAY', () => {
                            this.score = 0;
                            this.combo = 0;
                            this.timer.reset();
                            this.timer.start();
                            this.player.x = this.canvas.width / 2;
                        });
                    }
                } else if (scene === 'PLAY') {
                    this.timer.update(dt);
                    this.player.update(mx);

                    if (this.timer.isZero()) {
                        this.scenes.changeScene('RESULT', () => {
                            this.storage.saveBestScore(this.score);
                            this.bestScore = this.storage.getBestScore();
                        });
                    }
                } else if (scene === 'RESULT') {
                    const overRetry = UI.isInside(mx, my, 225, 460, 180, 50);
                    const overTitle = UI.isInside(mx, my, 225, 530, 180, 50);

                    if (pressed && !this.scenes.isFading) {
                        if (overRetry) {
                            this.scenes.changeScene('PLAY', () => {
                                this.score = 0;
                                this.combo = 0;
                                this.timer.reset();
                                this.timer.start();
                                this.player.x = this.canvas.width / 2;
                            });
                        } else if (overTitle) {
                            this.scenes.changeScene('TITLE');
                        }
                    }
                }
            }

            updateBackground(dt) {
                const speedMult = dt / 16.666;
                this.bgBubbles.forEach(b => {
                    b.y -= b.speed * speedMult;
                    if (b.y < -10) {
                        b.y = this.canvas.height + 10;
                        b.x = Math.random() * this.canvas.width;
                    }
                });
            }

            draw() {
                // Clear and render base scene background
                this.ctx.fillStyle = '#110a24';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // Grid matrix lines
                this.ctx.strokeStyle = 'rgba(128, 64, 255, 0.08)';
                this.ctx.lineWidth = 1;
                const gridSpacing = 40;
                for (let x = 0; x < this.canvas.width; x += gridSpacing) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, 0);
                    this.ctx.lineTo(x, this.canvas.height);
                    this.ctx.stroke();
                }
                for (let y = 0; y < this.canvas.height; y += gridSpacing) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y);
                    this.ctx.lineTo(this.canvas.width, y);
                    this.ctx.stroke();
                }

                // Rising ambient bubble particles
                this.ctx.fillStyle = 'rgba(255, 235, 59, 0.12)';
                this.bgBubbles.forEach(b => {
                    this.ctx.beginPath();
                    this.ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                    this.ctx.fill();
                });

                // Context variables for coordinates
                const mx = this.input.mouseX;
                const my = this.input.mouseY;
                const scene = this.scenes.currentScene;

                if (scene === 'TITLE') {
                    this.drawTitle(mx, my);
                } else if (scene === 'PLAY') {
                    this.drawPlay();
                } else if (scene === 'RESULT') {
                    this.drawResult(mx, my);
                }

                // Full viewport screen transitions
                this.scenes.drawTransition(this.ctx, this.canvas.width, this.canvas.height);
            }

            // ==========================================
            // SCENE: TITLE DRAW ENGINE
            // ==========================================
            drawTitle(mx, my) {
                this.ctx.fillStyle = '#E91E63';
                this.ctx.font = 'bold 36px "Courier New", Courier, monospace';
                this.ctx.textAlign = 'center';
                this.ctx.fillText("はかせの", 225, 200);

                this.ctx.fillStyle = '#FFEB3B';
                this.ctx.font = 'bold 38px "Courier New", Courier, monospace';
                this.ctx.fillText("ダーツパニック", 225, 260);

                // Drawing Dino mascot preview centered
                this.ctx.save();
                this.ctx.translate(225, 385);
                const previewDino = new Player(this.canvas.width, this.canvas.height);
                previewDino.x = 0;
                previewDino.y = 0;
                previewDino.draw(this.ctx);
                this.ctx.restore();

                // Action Menu Button
                const overStart = UI.isInside(mx, my, 225, 520, 180, 50);
                UI.drawButton(this.ctx, 225, 520, 180, 50, "START", this.input.isPressed, overStart);
            }

            // ==========================================
            // SCENE: PLAY DRAW ENGINE
            // ==========================================
            drawPlay() {
                // Character render
                this.player.draw(this.ctx);

                // HUD Panel Background
                this.ctx.fillStyle = 'rgba(15, 8, 30, 0.85)';
                this.ctx.strokeStyle = '#3F51B5';
                this.ctx.lineWidth = 2.5;
                this.ctx.beginPath();
                this.ctx.roundRect(15, 15, 420, 70, 10);
                this.ctx.fill();
                this.ctx.stroke();

                // TIME
                this.ctx.textAlign = 'left';
                this.ctx.fillStyle = '#80DEEA';
                this.ctx.font = 'bold 11px "Courier New", Courier, monospace';
                this.ctx.fillText("TIME", 30, 35);
                this.ctx.fillStyle = '#FF1744';
                this.ctx.font = 'bold 20px "Courier New", Courier, monospace';
                this.ctx.fillText(this.timer.getFormattedTime(), 30, 60);

                // SCORE
                this.ctx.textAlign = 'center';
                this.ctx.fillStyle = '#80DEEA';
                this.ctx.font = 'bold 11px "Courier New", Courier, monospace';
                this.ctx.fillText("SCORE", 175, 35);
                this.ctx.fillStyle = '#FFEB3B';
                this.ctx.font = 'bold 20px "Courier New", Courier, monospace';
                this.ctx.fillText(String(this.score).padStart(6, '0'), 175, 60);

                // COMBO
                this.ctx.textAlign = 'center';
                this.ctx.fillStyle = '#80DEEA';
                this.ctx.font = 'bold 11px "Courier New", Courier, monospace';
                this.ctx.fillText("COMBO", 270, 35);
                this.ctx.fillStyle = '#FF5722';
                this.ctx.font = 'bold 20px "Courier New", Courier, monospace';
                this.ctx.fillText(String(this.combo), 270, 60);

                // BEST SCORE
                this.ctx.textAlign = 'right';
                this.ctx.fillStyle = '#80DEEA';
                this.ctx.font = 'bold 11px "Courier New", Courier, monospace';
                this.ctx.fillText("BEST", 420, 35);
                this.ctx.fillStyle = '#00E676';
                this.ctx.font = 'bold 20px "Courier New", Courier, monospace';
                this.ctx.fillText(String(this.bestScore).padStart(6, '0'), 420, 60);
            }

            // ==========================================
            // SCENE: RESULT DRAW ENGINE
            // ==========================================
            drawResult(mx, my) {
                // Header Display
                this.ctx.fillStyle = '#FF1744';
                this.ctx.font = 'bold 44px "Courier New", Courier, monospace';
                this.ctx.textAlign = 'center';
                this.ctx.fillText("TIME UP", 225, 200);

                // Glass Board Wrapper
                this.ctx.fillStyle = 'rgba(15, 8, 30, 0.88)';
                this.ctx.strokeStyle = '#E91E63';
                this.ctx.lineWidth = 2;
                this.ctx.beginPath();
                this.ctx.roundRect(50, 240, 350, 160, 12);
                this.ctx.fill();
                this.ctx.stroke();

                // SCORE Panel
                this.ctx.fillStyle = '#B0BEC5';
                this.ctx.font = 'bold 14px "Courier New", Courier, monospace';
                this.ctx.fillText("SCORE", 225, 275);
                this.ctx.fillStyle = '#FFEB3B';
                this.ctx.font = 'bold 30px "Courier New", Courier, monospace';
                this.ctx.fillText(String(this.score).padStart(6, '0'), 225, 310);

                // BEST SCORE Panel
                this.ctx.fillStyle = '#B0BEC5';
                this.ctx.font = 'bold 14px "Courier New", Courier, monospace';
                this.ctx.fillText("BEST SCORE", 225, 350);
                this.ctx.fillStyle = '#00E676';
                this.ctx.font = 'bold 26px "Courier New", Courier, monospace';
                this.ctx.fillText(String(this.bestScore).padStart(6, '0'), 225, 382);

                // Game Navigation Controls
                const overRetry = UI.isInside(mx, my, 225, 460, 180, 50);
                const overTitle = UI.isInside(mx, my, 225, 530, 180, 50);

                UI.drawButton(this.ctx, 225, 460, 180, 50, "RETRY", this.input.isPressed, overRetry);
                UI.drawButton(this.ctx, 225, 530, 180, 50, "TITLE", this.input.isPressed, overTitle);
            }
        }

        // ==========================================
        // 8. INITIALIZE ENGINE RUNTIME
        // ==========================================
        const game = new Game();
        game.init();
    </script>
</body>
</html>
