<!DOCTYPE html><html lang='ja'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Ver0.0.7</title><style>html,body{margin:0;background:#140b28;overflow:hidden}canvas{display:block;margin:auto;background:#140b28;touch-action:none}</style></head><body><canvas id=c width=450 height=800></canvas><script>
