<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>三連複 GOD OF CHAOS Ver2.0.0</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:Arial;color:#fff}
canvas{position:fixed;inset:0}
#wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
h1{font-size:clamp(28px,6vw,64px);text-shadow:0 0 15px #f0f,0 0 40px #0ff}
#msg{font-size:38px;font-weight:bold;height:60px;text-shadow:0 0 20px #ff0}
#balls{display:flex;gap:22px;margin:25px}
.ball{
width:110px;height:110px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-size:52px;font-weight:bold;
background:#111;border:4px solid #fff;
box-shadow:0 0 25px #fff;
transition:.15s;
}
button{font-size:30px;padding:18px 48px;border:0;border-radius:15px;background:#ff0055;color:#fff;box-shadow:0 0 30px #f05}
.flash{animation:f .08s infinite alternate}
@keyframes f{from{filter:hue-rotate(0deg) brightness(1)}to{filter:hue-rotate(360deg) brightness(2)}}
.shake{animation:s .05s infinite}
@keyframes s{
0%{transform:translate(8px,-6px) rotate(1deg)}
25%{transform:translate(-8px,5px) rotate(-1deg)}
50%{transform:translate(6px,-8px)}
75%{transform:translate(-7px,6px)}
100%{transform:translate(5px,4px)}
}
.big{animation:b .5s infinite alternate}
@keyframes b{from{transform:scale(1)}to{transform:scale(1.15)}}
</style></head>
<body>
<canvas id="cv"></canvas>
<div id="wrap">
<h1>🎰 三連複 GOD OF CHAOS 🎰</h1>
<div id="msg">運命をタップせよ</div>
<div id="balls">
<div class="ball">?</div><div class="ball">?</div><div class="ball">?</div>
</div>
<button onclick="go()" id="btn">抽選開始</button>
</div>
<script>
const c=cv,x=c.getContext('2d');
function rs(){c.width=innerWidth;c.height=innerHeight}rs();onresize=rs;
let pts=[];
function spawn(n){
 for(let i=0;i<n;i++)pts.push({
 x:c.width/2,y:c.height/2,
 vx:(Math.random()-.5)*30,vy:(Math.random()-.5)*30,
 r:2+Math.random()*6,l:100+Math.random()*80,h:Math.random()*360
 });
}
(function loop(){
 x.fillStyle="rgba(0,0,0,.15)";
 x.fillRect(0,0,c.width,c.height);
 pts.forEach(p=>{
  p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.l--;
  x.beginPath();
  x.fillStyle=`hsl(${p.h},100%,60%)`;
  x.arc(p.x,p.y,p.r,0,7);x.fill();
 });
 pts=pts.filter(p=>p.l>0);
 requestAnimationFrame(loop);
})();
const balls=[...document.querySelectorAll('.ball')];
const wrap=document.getElementById('wrap');
const msg=document.getElementById('msg');
const btn=document.getElementById('btn');

const events=[
"⚠ WARNING","🌈 虹カットイン","💥 画面崩壊","🐔 ニワトリ降臨",
"🌍 地球崩壊","🚀 宇宙突入","⚡ 超雷撃","🔥 炎覚醒",
"👼 神降臨","🎰 GOD RUSH","✨ 復活！？","🎉 意味不明演出"
];

function unique3(){
 let a=[...Array(18)].map((_,i)=>i+1);
 for(let i=a.length-1;i>0;i--){
   let j=Math.floor(Math.random()*(i+1));
   [a[i],a[j]]=[a[j],a[i]];
 }
 return a.slice(0,3).sort((a,b)=>a-b);
}

async function wait(ms){return new Promise(r=>setTimeout(r,ms));}

async function go(){
 btn.disabled=true;
 wrap.classList.add("flash","shake","big");
 spawn(1200);

 const phases=[
 ["⚠ WARNING",900],
 ["🌍 地球崩壊",700],
 ["🚀 宇宙突入",700],
 ["🎰 GOD RUSH",900],
 ["✨ 復活！？",700],
 ["🐔 コケーーーーッ!!",600]
 ];

 for(const ph of phases){
   let end=Date.now()+ph[1];
   while(Date.now()<end){
     msg.textContent=ph[0];
     balls.forEach(b=>{
       b.textContent=1+Math.floor(Math.random()*18);
       b.style.background=`hsl(${Math.random()*360},100%,40%)`;
       b.style.boxShadow=`0 0 35px hsl(${Math.random()*360},100%,60%)`;
     });
     if(Math.random()<.15){spawn(150);}
     await wait(35);
   }
 }

 let r=unique3();
 balls.forEach((b,i)=>{
   b.textContent=r[i];
   b.style.background="#222";
   b.style.boxShadow="0 0 45px gold";
 });
 msg.textContent="👑 FINAL : "+r.join(" - ");
 wrap.classList.remove("flash","shake","big");
 if(navigator.vibrate)navigator.vibrate([150,50,150,50,400]);
 btn.disabled=false;
}
</script>
</body></html>
