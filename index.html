<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>三連複 GOD OF CHAOS Ver1.0.0</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;color:#fff;font-family:sans-serif}
#bg{position:fixed;inset:0}
#ui{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
h1{font-size:clamp(28px,5vw,54px);text-shadow:0 0 20px #f0f}
#nums{display:flex;gap:18px;margin:20px}
.ball{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;
font-size:52px;font-weight:bold;background:#111;border:4px solid #fff;
box-shadow:0 0 25px #fff;transition:.2s}
button{font-size:28px;padding:18px 42px;border-radius:14px;border:none;background:#ff0055;color:#fff}
#msg{margin-top:18px;font-size:28px;height:40px}
.flash{animation:f .08s infinite alternate}
@keyframes f{from{filter:hue-rotate(0)}to{filter:hue-rotate(360deg)}}
.shake{animation:s .05s infinite}
@keyframes s{
0%{transform:translate(4px,-3px)}25%{transform:translate(-6px,5px)}
50%{transform:translate(6px,-5px)}75%{transform:translate(-5px,-4px)}
100%{transform:translate(4px,4px)}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="ui">
<h1>🎰 三連複 GOD OF CHAOS 🎰</h1>
<div id="nums">
<div class="ball">?</div><div class="ball">?</div><div class="ball">?</div>
</div>
<button id="go">抽選開始</button>
<div id="msg">タップして運命を決めろ！</div>
</div>
<script>
const c=bg,ctx=c.getContext("2d");
function rs(){c.width=innerWidth;c.height=innerHeight}rs();onresize=rs;
let p=[];
function boom(){
 for(let i=0;i<500;i++)p.push({x:c.width/2,y:c.height/2,
 vx:(Math.random()-0.5)*25,vy:(Math.random()-0.5)*25,
 r:2+Math.random()*6,l:120});
}
function loop(){
 ctx.fillStyle="rgba(0,0,0,.2)";
 ctx.fillRect(0,0,c.width,c.height);
 p.forEach(o=>{
   o.x+=o.vx;o.y+=o.vy;o.vy+=.15;o.l--;
   ctx.beginPath();
   ctx.fillStyle=`hsl(${Math.random()*360} 100% 60%)`;
   ctx.arc(o.x,o.y,o.r,0,7);ctx.fill();
 });
 p=p.filter(a=>a.l>0);
 requestAnimationFrame(loop);
}
loop();

const balls=[...document.querySelectorAll(".ball")];
const msg=document.getElementById("msg");
const ui=document.getElementById("ui");
const texts=[
"超激熱！？","画面崩壊","復活！？","虹カットイン！","宇宙創生",
"ニワトリ降臨","意味不明演出","神の気まぐれ","まだ終わらない！"
];

async function draw(){
 go.disabled=true;
 ui.classList.add("flash","shake");
 boom();
 const start=performance.now();
 while(performance.now()-start<4500){
   balls.forEach(b=>{
      b.textContent=1+Math.floor(Math.random()*18);
      b.style.background=`hsl(${Math.random()*360} 100% 40%)`;
      b.style.boxShadow=`0 0 30px hsl(${Math.random()*360} 100% 60%)`;
   });
   msg.textContent=texts[Math.floor(Math.random()*texts.length)];
   if(Math.random()<0.03){
      msg.textContent="💥 復活演出発生 💥";
      await new Promise(r=>setTimeout(r,250));
   }
   await new Promise(r=>setTimeout(r,40));
 }
 let arr=[...Array(18)].map((_,i)=>i+1);
 arr.sort(()=>Math.random()-0.5);
 let res=arr.slice(0,3).sort((a,b)=>a-b);
 balls.forEach((b,i)=>{
   b.textContent=res[i];
   b.style.background="#222";
   b.style.boxShadow="0 0 40px gold";
 });
 ui.classList.remove("flash","shake");
 msg.textContent="🎉 完成！ "+res.join(" - ");
 if(navigator.vibrate) navigator.vibrate([200,80,200,80,400]);
 go.disabled=false;
}
go.onclick=draw;
</script>
</body>
</html>
