<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>三連複 GOD OF CHAOS Ver4.0.0</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;color:#fff;font-family:Arial}
#fx,#stars{position:fixed;inset:0}
#ui{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center}
h1{font-size:clamp(28px,5vw,58px);text-shadow:0 0 15px #f0f,0 0 40px #0ff}
#msg{font-size:38px;height:60px;font-weight:bold;text-shadow:0 0 15px gold}
#result{display:none;gap:18px;margin:20px}
.ball{width:110px;height:110px;border-radius:50%;display:flex;justify-content:center;align-items:center;
background:#111;border:4px solid #fff;font-size:54px;font-weight:bold;box-shadow:0 0 30px gold}
button{font-size:30px;padding:18px 45px;border:none;border-radius:12px;background:#ff0055;color:#fff}
.hide{display:none!important}
.flash{animation:f .08s infinite alternate}
@keyframes f{from{filter:hue-rotate(0)}to{filter:hue-rotate(360deg) brightness(2)}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<canvas id="fx"></canvas>
<div id="ui">
<h1>🎰 三連複 GOD OF CHAOS 🎰</h1>
<div id="msg">運命を選べ</div>
<div id="result"><div class="ball">?</div><div class="ball">?</div><div class="ball">?</div></div>
<button id="go">抽選開始</button>
</div>
<script>
const s=stars,sc=s.getContext("2d"),f=fx,fc=f.getContext("2d");
function rs(){s.width=f.width=innerWidth;s.height=f.height=innerHeight}rs();onresize=rs;
let pts=[];
function boom(x,y,n){for(let i=0;i<n;i++)pts.push({x,y,vx:(Math.random()-.5)*24,vy:(Math.random()-.5)*24,l:120,h:Math.random()*360,r:2+Math.random()*4})}
(function loop(){
sc.fillStyle="rgba(0,0,0,.25)";sc.fillRect(0,0,s.width,s.height);
pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.l--;
sc.fillStyle=`hsl(${p.h},100%,60%)`;sc.beginPath();sc.arc(p.x,p.y,p.r,0,7);sc.fill();});
pts=pts.filter(p=>p.l>0);requestAnimationFrame(loop);
})();
const msg=document.getElementById("msg"),go=document.getElementById("go"),res=document.getElementById("result");
const balls=[...document.querySelectorAll(".ball")];
const seq=[
"⚠ WARNING","🌌 BLACK HOLE","🌍 地球崩壊","🚀 宇宙突入",
"🎰 GOD RUSH","✨ 復活!?","💥 画面崩壊","🐔 ニワトリ乱入",
"🌈 LAST CHANCE","👼 神降臨","🔥 FINAL JUDGE"
];
const wait=t=>new Promise(r=>setTimeout(r,t));
function pick(){let a=[...Array(18)].keys()].map(v=>v+1);for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a.slice(0,3).sort((a,b)=>a-b);}
go.onclick=async()=>{
go.disabled=true;go.classList.add("hide");res.style.display="none";document.body.classList.add("flash");
for(let t of seq){
msg.textContent=t;
boom(innerWidth/2,innerHeight/2,300);
await wait(650);
}
document.body.classList.remove("flash");
let r=pick();
res.style.display="flex";
balls.forEach((b,i)=>b.textContent=r[i]);
msg.textContent="👑 FINAL  "+r.join(" - ");
navigator.vibrate&&navigator.vibrate([150,50,150,300]);
go.classList.remove("hide");go.disabled=false;
}
</script>
</body>
</html>
