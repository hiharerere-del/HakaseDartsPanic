<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HakaseDartsPanic Ver0.0.3</title>
<style>
html,body{margin:0;background:#140b28;overflow:hidden}
canvas{display:block;margin:auto;background:#140b28;touch-action:none}
</style>
</head>
<body>
<canvas id="game" width="450" height="800"></canvas>
<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

class Player{
 constructor(){this.x=225;this.y=740;this.r=22;this.targetX=225;}
 update(){this.x+=(this.targetX-this.x)*0.25;}
 draw(){
  ctx.fillStyle="#ffd95e";
  ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fill();
 }
}

class Dart{
 constructor(x,y){this.x=x;this.y=y;this.r=4;this.alive=true;}
 update(){this.y-=12;if(this.y<-20)this.alive=false;}
 draw(){ctx.fillStyle="#fff";ctx.fillRect(this.x-1,this.y-16,2,18);}
}

class DartManager{
 constructor(){this.list=[];this.cool=0;}
 update(player){
   if(--this.cool<=0){this.list.push(new Dart(player.x,player.y-25));this.cool=10;}
   this.list.forEach(d=>d.update());
   this.list=this.list.filter(d=>d.alive);
 }
 draw(){this.list.forEach(d=>d.draw());}
}

class Enemy{
 constructor(x,y){this.reset(x,y);}
 reset(x,y){this.x=x;this.y=y;this.r=18;this.speed=2+Math.random()*2;this.alive=true;}
 update(){this.y+=this.speed;if(this.y>840)this.reset(30+Math.random()*390,-50);}
 draw(){ctx.fillStyle="#ff4a4a";ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fill();}
}

const player=new Player();
const darts=new DartManager();
const enemies=[];
let score=0;
for(let i=0;i<5;i++)enemies.push(new Enemy(50+i*70,-i*150));

canvas.addEventListener("pointermove",e=>{
 const r=canvas.getBoundingClientRect();
 player.targetX=(e.clientX-r.left)*(450/r.width);
});

function hit(a,b){
 const dx=a.x-b.x,dy=a.y-b.y;
 return Math.hypot(dx,dy)<a.r+b.r;
}

function loop(){
 ctx.fillStyle="#140b28";
 ctx.fillRect(0,0,450,800);

 player.update();
 darts.update(player);
 enemies.forEach(en=>en.update());

 darts.list.forEach(d=>{
   enemies.forEach(en=>{
     if(hit(d,en)){d.alive=false;en.reset(30+Math.random()*390,-50);score++;}
   });
 });

 enemies.forEach(en=>en.draw());
 darts.draw();
 player.draw();

 ctx.fillStyle="#fff";
 ctx.font="20px sans-serif";
 ctx.fillText("Ver0.0.3",20,30);
 ctx.fillText("Score: "+score,20,60);

 requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
