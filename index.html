<!DOCTYPE html><html lang='ja'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Ver0.0.5</title><style>html,body{margin:0;background:#140b28;overflow:hidden}canvas{display:block;margin:auto;background:#140b28;touch-action:none}</style></head><body><canvas id=c width=450 height=800></canvas><script>
const cv=c,x=cv.getContext('2d');
class P{constructor(){this.x=225;this.y=740;this.r=22;this.tx=225;}u(){this.x+=(this.tx-this.x)*.25;}d(){x.fillStyle='#ffd95e';x.beginPath();x.arc(this.x,this.y,this.r,0,7);x.fill();}}
class D{constructor(a,b){this.x=a;this.y=b;this.r=4;this.a=1;}u(){this.y-=12;if(this.y<-20)this.a=0;}d(){x.fillStyle='#fff';x.fillRect(this.x-1,this.y-16,2,18);}}

class E{constructor(){this.rst()}rst(){this.x=30+Math.random()*390;this.y=-Math.random()*300;this.r=18;this.s=2+Math.random()*2;}u(){this.y+=this.s;}d(){x.fillStyle='#ff5555';x.beginPath();x.arc(this.x,this.y,this.r,0,7);x.fill();}}

for(const d of dm.l){if(!d.a)continue;for(const e of en){if(hit(d,e)){d.a=0;score++;e.rst();break;}}}}
