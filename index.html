<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HakaseDartsPanic Ver0.0.4</title>
<style>html,body{margin:0;background:#140b28;overflow:hidden}canvas{display:block;margin:auto;background:#140b28;touch-action:none}</style>
</head><body><canvas id="game" width="450" height="800"></canvas><script>
const c=document.getElementById("game"),x=c.getContext("2d");
class Player{constructor(){this.x=225;this.y=740;this.r=22;this.tx=225;}update(){this.x+=(this.tx-this.x)*0.25;}draw(){x.fillStyle="#ffd95e";x.beginPath();x.arc(this.x,this.y,this.r,0,6.28);x.fill();}}
class Dart{constructor(px,py){this.x=px;this.y=py;this.r=4;this.alive=true;}update(){this.y-=12;if(this.y<-20)this.alive=false;}draw(){x.fillStyle="#fff";x.fillRect(this.x-1,this.y-16,2,18);}}
class Darts{constructor(){this.l=[];this.cool=0;}update(p){if(--this.cool<=0){this.l.push(new Dart(p.x,p.y-25));this.cool=10;}this.l.forEach(d=>d.update());this.l=this.l.filter(d=>d.alive);}draw(){this.l.forEach(d=>d.draw());}}
class Enemy{constructor(){this.reset();}reset(){this.x=30+Math.random()*390;this.y=-20-Math.random()*300;this.r=18;this.s=2+Math.random()*2;}update(){this.y+=this.s;if(this.y>840)this.reset();}draw(){x.fillStyle="#ff5555";x.beginPath();x.arc(this.x,this.y,this.r,0,6.28);x.fill();}}
class Fx{constructor(px,py){this.x=px;this.y=py;this.t=20;}update(){this.t--;}draw(){x.strokeStyle="#ffff66";x.beginPath();x.arc(this.x,this.y,22-this.t/2,0,6.28);x.stroke();}get alive(){return this.t>0;}}
const p=new Player(),dm=new Darts(),en=[...Array(5)].map(()=>new Enemy()),fx=[];let score=0;
c.onpointermove=e=>{const r=c.getBoundingClientRect();p.tx=(e.clientX-r.left)*450/r.width;}
const hit=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y)<a.r+b.r;
(function loop(){
x.fillStyle="#140b28";x.fillRect(0,0,450,800);
p.update();dm.update(p);en.forEach(e=>e.update());
for(const d of dm.l){if(!d.alive)continue;for(const e of en){if(hit(d,e)){d.alive=false;score++;fx.push(new Fx(e.x,e.y));e.reset();break;}}}
fx.forEach(f=>f.update());
while(fx.length&& !fx[0].alive)fx.shift();
en.forEach(e=>e.draw());dm.draw();fx.forEach(f=>f.draw());p.draw();
x.fillStyle="#fff";x.font="20px sans-serif";x.fillText("Ver0.0.4",20,30);x.fillText("Score "+score,20,60);
requestAnimationFrame(loop);
})();
</script></body></html>
